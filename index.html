<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球B隊預備班 · 點名系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang HK', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f5f7fb;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 30px 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #1a2634;
            border-left: 6px solid #1e7b4b;
            padding-left: 16px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 30px;
            background: #f0f4fa;
            border-radius: 18px;
            padding: 18px 24px;
            margin-bottom: 28px;
            align-items: center;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            color: #1f2a3a;
        }
        .meta-item select, .meta-item input {
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .meta-item select:focus, .meta-item input:focus {
            border-color: #1e7b4b;
            box-shadow: 0 0 0 3px rgba(30,123,75,0.15);
        }
        .coach-fixed {
            background: #e9eff6;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 500;
            color: #0e2b1f;
        }
        .table-wrap {
            overflow-x: auto;
            margin: 20px 0 18px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 780px;
        }
        th {
            background: #eef2f7;
            color: #1f2a3a;
            font-weight: 600;
            padding: 14px 8px;
            white-space: nowrap;
            text-align: center;
            border-bottom: 2px solid #d0d9e6;
        }
        td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #e9edf3;
            vertical-align: middle;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .status-select {
            padding: 5px 8px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 13px;
            font-weight: 500;
            min-width: 85px;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
        }
        .status-select:focus {
            border-color: #1e7b4b;
            box-shadow: 0 0 0 3px rgba(30,123,75,0.15);
        }
        .badge {
            display: inline-block;
            padding: 0 6px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 28px 0 12px 0;
            color: #1a2b3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title small {
            font-size: 14px;
            font-weight: 400;
            color: #4b5a6e;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 24px 0 18px;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            color: #1f2a3a;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
        }
        .btn-primary {
            background: #1e7b4b;
            border: 1px solid #1e7b4b;
            color: white;
        }
        .btn-primary:hover {
            background: #166b3e;
            border-color: #166b3e;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #1e7b4b;
            color: #1e7b4b;
        }
        .btn-outline:hover {
            background: #e9f3ee;
        }
        .btn-whatsapp {
            background: #25D366;
            border: 1px solid #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background: #1ebe5a;
        }
        .preview-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 18px 22px;
            border: 1px solid #e2e8f0;
            margin: 20px 0 10px;
            white-space: pre-wrap;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #1e293b;
            max-height: 420px;
            overflow: auto;
        }
        .preview-box strong {
            color: #0b2d1e;
        }
        .footer-meta {
            font-size: 13px;
            color: #5f6d7e;
            margin-top: 8px;
            text-align: right;
            border-top: 1px dashed #dce2ec;
            padding-top: 12px;
        }
        .inline-emoji {
            font-size: 1.1em;
            margin-right: 2px;
        }
        .gender-badge {
            display: inline-block;
            width: 24px;
            font-weight: 600;
        }
        .copy-btn {
            background: #eef2f7;
            border: 1px solid #d0d9e6;
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            .meta-grid { flex-direction: column; align-items: stretch; gap: 12px; }
        }
        .follow-row {
            background: #f8faff;
        }
        .follow-row td {
            background: #f8faff;
        }
        .follow-label {
            font-weight: 500;
            color: #1e5a7a;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🏓 乒乓球B隊預備班 · 點名系統</h1>

    <!-- 日期／場地／教練 -->
    <div class="meta-grid">
        <div class="meta-item">
            <span>📅 日期</span>
            <input type="date" id="trainingDate" value="2026-06-19" style="width:150px;">
        </div>
        <div class="meta-item">
            <span>⏰ 時段</span>
            <select id="timeSlotSelect">
                <option value="星期四（16:00-18:00）">星期四（16:00-18:00）</option>
                <option value="星期六（10:00-13:00）" selected>星期六（10:00-13:00）</option>
            </select>
        </div>
        <div class="meta-item">
            <span>📍 場地</span>
            <select id="venueSelect">
                <option value="圓洲角體育館">圓洲角體育館</option>
                <option value="保安道體育館" selected>保安道體育館</option>
            </select>
        </div>
        <div class="meta-item">
            <span>👨‍🏫 負責教練</span>
            <span class="coach-fixed">梁金祐 · 冼佩蓮</span>
        </div>
    </div>

    <!-- 表格：運動員 + 跟操 -->
    <div class="section-title">📋 運動員名單 <small>（點選狀態）</small></div>
    <div class="table-wrap">
        <table id="rosterTable">
            <thead>
                <tr>
                    <th>機構</th>
                    <th>中文姓名</th>
                    <th>英文姓名</th>
                    <th>性別</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="rosterBody">
                <!-- 由 js 動態產生 -->
            </tbody>
        </table>
    </div>

    <!-- 跟操運動員 -->
    <div class="section-title" style="margin-top:12px;">🔄 跟操運動員</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>機構</th><th>中文姓名</th><th>英文姓名</th><th>性別</th><th>狀態</th></tr></thead>
            <tbody id="followBody"></tbody>
        </table>
    </div>

    <!-- 按鈕列 -->
    <div class="action-bar">
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="generatePreviewBtn">📄 生成文案預覽</button>
            <button class="btn btn-whatsapp" id="whatsappSendBtn">📲 傳送至 WhatsApp</button>
        </div>
        <div>
            <button class="btn copy-btn" id="copyPreviewBtn">📋 複製文案</button>
        </div>
    </div>

    <!-- 文案預覽 -->
    <div class="section-title" style="margin-top:6px;">📝 文案預覽</div>
    <div class="preview-box" id="previewContent">
        ⏳ 點擊「生成文案預覽」或修改狀態後自動更新
    </div>
    <div class="footer-meta" id="generatedTimeMeta"></div>

</div>
<script>
    (function() {
        // ---------- 原始數據 ----------
        const players = [
            { org: '才俊', cname: '陳紫漩', ename: 'Chan Tsz Suen', gender: 'F' },
            { org: '基順', cname: '羅嘉熙', ename: 'Law Ka Hei', gender: 'M' },
            { org: '觀塘展亮', cname: '黃駿佑', ename: 'Wong Chun Yau', gender: 'M' },
            { org: '觀塘展亮', cname: '李文灝', ename: 'Lee Man Ho', gender: 'M' },
            { org: '獅子會晨崗', cname: '許銘賢', ename: 'Hui Ming Yin', gender: 'M' },
            { org: '松嶺職訓', cname: '華悅恩', ename: 'Wa Yuet Yan', gender: 'F' },
            { org: '救主', cname: 'ALESIVAN', ename: 'NA', gender: 'M' },
            { org: '沙田公立', cname: '陳永悅', ename: 'Chau Wing Yuet', gender: 'F' },
            { org: '沙田公立', cname: '吳家俊', ename: 'Ng Ka Chun', gender: 'M' },
            { org: '沙田公立', cname: '陳澤賢', ename: 'Chau Chak Yin', gender: 'M' },
            { org: '西區晨輝', cname: '石振星', ename: 'Shek Chun Sing', gender: 'M' },
            { org: '循道衛理', cname: '張思澈', ename: 'Cheung Sze Cit', gender: 'M' }
        ];

        const followPlayers = [
            { org: '才俊', cname: '鄭宇軒', ename: 'NA', gender: 'M' }
        ];

        // 狀態清單 (含 Emoji)
        const STATUS_OPTIONS = [
            { value: 'Yes', label: '✅ Yes 出席' },
            { value: 'Abs', label: '📅 Abs 請假' },
            { value: 'O', label: '❌ O 無故缺席' },
            { value: 'L', label: '⏰ L 遲到' },
            { value: 'S', label: '🤒 S 病假' },
            { value: 'C', label: '🏆 C 出外比賽' }
        ];

        // 狀態 Emoji 對照 (用於文案)
        const statusEmojiMap = {
            'Yes': '✅',
            'Abs': '📅',
            'O': '❌',
            'L': '⏰',
            'S': '🤒',
            'C': '🏆'
        };

        // 主要表格 tbody
        const rosterBody = document.getElementById('rosterBody');
        const followBody = document.getElementById('followBody');

        // 儲存所有 select 元素參考 (以便取得狀態)
        let mainSelects = [];
        let followSelects = [];

        // 渲染主表格
        function renderMainTable() {
            rosterBody.innerHTML = '';
            mainSelects = [];
            players.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.org}</td>
                    <td><strong>${p.cname}</strong></td>
                    <td>${p.ename}</td>
                    <td><span class="gender-badge">${p.gender === 'M' ? '♂️ 男' : '♀️ 女'}</span></td>
                    <td><select class="status-select" data-idx="${idx}"></select></td>
                `;
                rosterBody.appendChild(tr);
                const sel = tr.querySelector('.status-select');
                // 填充 options
                STATUS_OPTIONS.forEach(opt => {
                    const op = document.createElement('option');
                    op.value = opt.value;
                    op.textContent = opt.label;
                    sel.appendChild(op);
                });
                sel.value = 'Yes'; // 預設出席
                mainSelects.push(sel);
                // 監聽變更 => 自動更新預覽
                sel.addEventListener('change', () => generatePreview());
            });
        }

        // 渲染跟操表格
        function renderFollowTable() {
            followBody.innerHTML = '';
            followSelects = [];
            followPlayers.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.className = 'follow-row';
                tr.innerHTML = `
                    <td>${p.org}</td>
                    <td><strong>${p.cname}</strong></td>
                    <td>${p.ename}</td>
                    <td><span class="gender-badge">${p.gender === 'M' ? '♂️ 男' : '♀️ 女'}</span></td>
                    <td><select class="status-select follow-select" data-fidx="${idx}"></select></td>
                `;
                followBody.appendChild(tr);
                const sel = tr.querySelector('.follow-select');
                STATUS_OPTIONS.forEach(opt => {
                    const op = document.createElement('option');
                    op.value = opt.value;
                    op.textContent = opt.label;
                    sel.appendChild(op);
                });
                sel.value = 'Yes';
                followSelects.push(sel);
                sel.addEventListener('change', () => generatePreview());
            });
        }

        // ---------- 生成文案 (核心) ----------
        function generatePreview() {
            const dateInput = document.getElementById('trainingDate');
            const timeSlot = document.getElementById('timeSlotSelect').value;
            const venue = document.getElementById('venueSelect').value;
            const coach = '梁金祐 · 冼佩蓮';

            // 取得所有狀態
            const mainStatus = mainSelects.map(sel => sel.value);
            const followStatus = followSelects.map(sel => sel.value);

            // 計算出席率 (只計算主運動員)
            const total = players.length;
            const present = mainStatus.filter(s => s === 'Yes').length;
            const attendanceRate = total > 0 ? Math.round((present / total) * 100) : 0;

            // 格式化日期 (yyyy-mm-dd)
            let dateStr = dateInput.value || '2026-06-19';
            // 產生 24小時制 時間
            const now = new Date();
            const hours24 = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const time24 = `${hours24}:${mins}`;

            // 組裝文案
            let lines = [];
            lines.push(`🏓 乒乓球B隊預備班訓練 點名記錄`);
            lines.push(`📅 日期：${dateStr}`);
            lines.push(`⏰ 時間：${timeSlot}`);
            lines.push(`📍 地點：${venue}`);
            lines.push(`👨‍🏫 負責教練：${coach}`);
            lines.push(`📊 出席率：${attendanceRate}% (${present}/${total})`);
            lines.push(``);
            lines.push(`▍ 運動員名單`);

            // 主運動員
            players.forEach((p, idx) => {
                const st = mainStatus[idx] || 'Yes';
                const emoji = statusEmojiMap[st] || '⬜';
                const statusLabel = st === 'Yes' ? '出席' : 
                                    st === 'Abs' ? '請假' :
                                    st === 'O' ? '無故缺席' :
                                    st === 'L' ? '遲到' :
                                    st === 'S' ? '病假' :
                                    st === 'C' ? '出外比賽' : st;
                const genderSymbol = p.gender === 'M' ? '♂️' : '♀️';
                lines.push(`${emoji} ${p.cname} (${p.ename}) ${genderSymbol} ${p.org} · ${statusLabel}`);
            });

            // 跟操運動員
            if (followPlayers.length > 0) {
                lines.push(``);
                lines.push(`▍ 跟操運動員`);
                followPlayers.forEach((p, idx) => {
                    const st = followStatus[idx] || 'Yes';
                    const emoji = statusEmojiMap[st] || '⬜';
                    const statusLabel = st === 'Yes' ? '出席' : 
                                        st === 'Abs' ? '請假' :
                                        st === 'O' ? '無故缺席' :
                                        st === 'L' ? '遲到' :
                                        st === 'S' ? '病假' :
                                        st === 'C' ? '出外比賽' : st;
                    const genderSymbol = p.gender === 'M' ? '♂️' : '♀️';
                    lines.push(`${emoji} ${p.cname} (${p.ename || 'NA'}) ${genderSymbol} ${p.org} · ${statusLabel}`);
                });
            }

            lines.push(``);
            lines.push(`📎 此記錄由點名系統自動生成  ${dateStr} ${time24}`);

            const previewText = lines.join('\n');
            document.getElementById('previewContent').textContent = previewText;
            // 更新時間戳
            document.getElementById('generatedTimeMeta').innerHTML = `🕒 生成時間：${dateStr} ${time24} (24小時制) · 系統自動記錄`;

            // 儲存至全域以便 whatsapp
            window.__currentPreview = previewText;
            return previewText;
        }

        // ---------- 按鈕事件 ----------
        document.getElementById('generatePreviewBtn').addEventListener('click', function() {
            generatePreview();
        });

        // WhatsApp 傳送
        document.getElementById('whatsappSendBtn').addEventListener('click', function() {
            const text = window.__currentPreview || generatePreview();
            // 手機號碼留空 (讓用家自己選擇聯絡人)
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        });

        // 複製文案
        document.getElementById('copyPreviewBtn').addEventListener('click', function() {
            const text = window.__currentPreview || generatePreview();
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ 文案已複製到剪貼簿');
            }).catch(() => {
                // fallback
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                document.body.removeChild(area);
                alert('✅ 文案已複製');
            });
        });

        // 日期變更、場地變更、時段變更 都觸發預覽
        document.getElementById('trainingDate').addEventListener('change', generatePreview);
        document.getElementById('timeSlotSelect').addEventListener('change', generatePreview);
        document.getElementById('venueSelect').addEventListener('change', generatePreview);

        // 初始化
        renderMainTable();
        renderFollowTable();
        // 預設產生一次文案
        setTimeout(() => {
            generatePreview();
        }, 50);
    })();
</script>
</body>
</html>
